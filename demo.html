<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>米埗村 - 农房信息管理系统</title>

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<div class="control-bar">
<span id="loadingStatus">正在加载数据...</span>
<span class="status-text" id="statusText">初始化中</span>
</div>

<div class="main-container">

<!-- 左侧 -->
<div class="left-section">

<div class="section-header">
<h1>米埗村</h1>
</div>

<div class="svg-container">

<svg class="village-svg" id="villageSvg"
viewBox="0 0 1868 1302"
preserveAspectRatio="xMidYMid meet">

<image
href="images/village_aerial.JPG"
x="0"
y="0"
width="1868"
height="1302"
/>

<g id="hotspotsGroup"></g>
<g id="labelsGroup"></g>

</svg>

<div class="coordinate-display" id="coordinateDisplay">
<div class="coordinate-label">鼠标坐标</div>
<div class="coordinate-value" id="coordinateValue">X:0 Y:0</div>
</div>

</div>
</div>

<!-- 右侧面板 -->
<div class="right-panel" id="rightPanel">

<div id="houseInfo">

<div class="panel-header">
房屋信息
</div>

<div class="info-item">
<div class="info-label">房屋编码</div>
<div class="info-value" id="houseCode"></div>
</div>

<div class="info-item">
<div class="info-label">房屋名称</div>
<div class="info-value" id="houseName"></div>
</div>

<div class="info-item">
<div class="info-label">建成年代</div>
<div class="info-value" id="buildYear"></div>
</div>

<div class="info-item">
<div class="info-label">占地面积</div>
<div class="info-value" id="area"></div>
</div>

</div>

</div>

</div>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
